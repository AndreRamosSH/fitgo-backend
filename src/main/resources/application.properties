# FitGO - Configuraci\u00c3\u00b3n de la Aplicaci\u00c3\u00b3n

spring.application.name=FitGO
spring.profiles.active=${SPRING_PROFILE:dev}

# BD - Configuraci\u00c3\u00b3n de la Base de Datos
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fitgo_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:12345}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT - JSON Web Token
# secret: clave de 256 bits para firmar los tokens
# expiration: duraci\u00c3\u00b3n en milisegundos (86400000 = 24 horas)
fitgo.jwt.secret=${JWT_SECRET:FitGO2025SecretKeyParaJWTMuySeguraYLarga256Bits!!}
fitgo.jwt.expiration=${JWT_EXPIRATION:86400000}

# Servidor
server.port=8080
